  <body>
    <div id="boot-status" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;color:#111;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;z-index:99999">
      <div style="text-align:center">
        <div style="width:44px;height:44px;margin:0 auto 12px;border-radius:50%;border:4px solid #d4af37;border-top-color:transparent;animation:spin 0.9s linear infinite"></div>
        <div>Cargando dashboard…</div>
        <div id="boot-error" style="margin-top:8px;color:#b91c1c;font-size:12px;max-width:80ch"></div>
      </div>
      <style>
        @keyframes spin { to { transform: rotate(360deg) } }
      </style>
    </div>
    <div id="root"></div>

    <!-- Tu app (Vite) -->

    <!-- Overlay de errores de arranque para diagnosticar pantalla en blanco -->
    <script>
      (function () {
        function showBootError(msg) {
          try {
            var el = document.getElementById('boot-error');
            if (!el) return;
            el.textContent = String(msg || 'Error desconocido al iniciar');
          } catch {}
        }
        globalThis.addEventListener('error', function (e) {
          try {
            var m = (e && e.error && e.error.message) || (e && e.message) || e;
            showBootError(m);
          } catch (err) { console.warn('boot overlay error handler failed', err); }
        });
        globalThis.addEventListener('unhandledrejection', function (e) {
          try {
            var r = e && e.reason;
            var m = (r && (r.message || r.msg)) || String(r);
            showBootError(m);
          } catch (err) { console.warn('boot overlay rejection handler failed', err); }
        });

        // Si la app no monta en N segundos, forzar recarga con cache-busting
        var BOOT_TIMEOUT_MS = 8000;
        try {
          setTimeout(function(){
            try {
              // main.tsx setea esta marca cuando React montó
              if (!(globalThis /** @type {any} */)['__APP_MOUNTED__']) {
                var u = new URL(location.href);
                u.searchParams.set('v', Date.now().toString());
                location.replace(u.toString());
              }
            } catch (err) { console.warn('boot overlay watchdog failed', err); }
          }, BOOT_TIMEOUT_MS);
        } catch (err) { console.warn('boot overlay could not start watchdog', err); }
      })();
    </script>

    <!-- Forzar HTTPS en producción en caso de proxies sin redirección -->
    <script>
      (function(){
        try {
          var isLocal = /^(localhost|127\.0\.0\.1)/.test(location.hostname);
          if (!isLocal && location.protocol !== 'https:') {
            location.href = 'https://' + location.host + location.pathname + location.search + location.hash;
          }
        } catch (e) { console.warn('https redirect snippet failed', e); }
      })();
    </script>

    <!-- Chatwoot se inicializa desde src/lib/chatwootWidget.ts -->

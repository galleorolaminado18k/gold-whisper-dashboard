name: Deploy Chatwoot Bridge (Fly.io)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Fly.io app name (will be created if missing)"
        required: false
        default: "gold-whisper-api"
      region:
        description: "Fly.io region (e.g., dfw, mia, gru)"
        required: false
        default: "dfw"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      APP_NAME: ${{ inputs.app_name }}
      REGION: ${{ inputs.region }}
      # Bridge runtime secrets (forwarded to Fly)
      CHATWOOT_URL: ${{ secrets.CHATWOOT_URL }}
      CHATWOOT_API_TOKEN: ${{ secrets.CHATWOOT_API_TOKEN }}
      CHATWOOT_ACCOUNT_ID: ${{ secrets.CHATWOOT_ACCOUNT_ID }}
      FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
      ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Ensure app exists
        working-directory: gold-whisper-dashboard/api
        run: |
          set -e
          echo "Using Fly app: $APP_NAME (region: $REGION)"
          # Try to create; ignore error if already exists
          flyctl apps create "$APP_NAME" --region "$REGION" || true

      - name: Set Fly secrets from GitHub Secrets
        if: env.CHATWOOT_URL != '' && env.CHATWOOT_API_TOKEN != '' && env.CHATWOOT_ACCOUNT_ID != ''
        working-directory: gold-whisper-dashboard/api
        run: |
          set -e
          flyctl secrets set \
            CHATWOOT_URL="$CHATWOOT_URL" \
            CHATWOOT_API_TOKEN="$CHATWOOT_API_TOKEN" \
            CHATWOOT_ACCOUNT_ID="$CHATWOOT_ACCOUNT_ID" \
            FRONTEND_URL="${FRONTEND_URL:-https://dashboard.galle18k.com}" \
            ALLOWED_ORIGINS="${ALLOWED_ORIGINS:-https://dashboard.galle18k.com}" \
            --app "$APP_NAME"

      - name: Deploy bridge to Fly.io
        working-directory: gold-whisper-dashboard/api
        run: |
          set -e
          flyctl deploy --app "$APP_NAME" --config fly.toml --remote-only --now

      - name: Health check
        run: |
          set -e
          echo "Bridge URL: https://$APP_NAME.fly.dev"
          curl -fsS "https://$APP_NAME.fly.dev/health" || true

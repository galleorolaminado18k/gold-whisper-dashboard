name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Base path for GitHub Pages project site
      VITE_ASSET_BASE: /gold-whisper-dashboard/
      VITE_ROUTER_BASENAME: /gold-whisper-dashboard
      # App Secrets (configure in repo Settings > Secrets and variables > Actions)
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_CHATWOOT_ENABLED: ${{ secrets.VITE_CHATWOOT_ENABLED }}
      VITE_CHATWOOT_URL: ${{ secrets.VITE_CHATWOOT_URL }}
      VITE_CHATWOOT_WEBSITE_TOKEN: ${{ secrets.VITE_CHATWOOT_WEBSITE_TOKEN }}
      VITE_CHATWOOT_ACCOUNT_ID: ${{ secrets.VITE_CHATWOOT_ACCOUNT_ID }}
      VITE_BRIDGE_API_URL: ${{ secrets.VITE_BRIDGE_API_URL }}
      VITE_META_ACCESS_TOKEN: ${{ secrets.VITE_META_ACCESS_TOKEN }}
      VITE_META_ACCESS_TOKEN_2: ${{ secrets.VITE_META_ACCESS_TOKEN_2 }}
      VITE_META_AD_ACCOUNT_ID: ${{ secrets.VITE_META_AD_ACCOUNT_ID }}
      VITE_META_AD_ACCOUNT_IDS: ${{ secrets.VITE_META_AD_ACCOUNT_IDS }}
      VITE_META_AD_ACCOUNT_NAMES: ${{ secrets.VITE_META_AD_ACCOUNT_NAMES }}
      VITE_META_BUSINESS_ID: ${{ secrets.VITE_META_BUSINESS_ID }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Guard – ensure no .env files are committed
        run: |
          if git ls-files | grep -E '(^|/)\.env(\.|$)'; then
            echo "Error: One or more .env files are tracked in git. Remove them and push again." >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages

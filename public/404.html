<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <!-- Redirect to the GitHub Pages project subpath -->
    <meta http-equiv="refresh" content="0; url=/gold-whisper-dashboard/" />
    <script>
      (function () {
        var basePath = '/gold-whisper-dashboard';
        try {
          sessionStorage.setItem(
            'redirectAfterReload',
            location.pathname + location.search + location.hash
          );
        } catch (e) {}
        var l = window.location;
        var target = basePath + '/';
        if (l.origin && l.origin.indexOf('github.io') !== -1) {
          // Ensure absolute URL to avoid mixed base issues
          target = l.protocol + '//' + l.host + basePath + '/';
        }
        l.replace(target);
      })();
    </script>
  </head>
  <body>Redirecting…</body>
  </html>

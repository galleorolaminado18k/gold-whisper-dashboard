<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (function () {
        try {
          // Guarda la ruta original para que el SPA la restaure al cargar
          sessionStorage.setItem('redirectAfterReload', location.pathname + location.search + location.hash);
        } catch (_) {}

        // Si es github.io, redirige a /<repo>/, si no, a la raíz '/'
        var isGithub = /github\.io$/i.test(location.host);
        // Ajusta el nombre del repo si fuese necesario en forks; aquí usamos el actual
        var repoBase = '/gold-whisper-dashboard';
        var target = isGithub ? repoBase + '/' : '/';
        // Forzar URL absoluta en github.io para evitar bases relativas
        if (isGithub) {
          target = location.protocol + '//' + location.host + target;
        }
        location.replace(target);
      })();
    </script>
  </head>
  <body>Redirecting…</body>
</html>
